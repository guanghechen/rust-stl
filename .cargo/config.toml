[alias]
rel-dry = "release publish --workspace --no-confirm"
rel = "release publish --workspace --no-confirm -x"
"publish:plan" = "run --quiet --manifest-path scripts/publish-cli/Cargo.toml -- plan"
"publish:tag" = "run --quiet --manifest-path scripts/publish-cli/Cargo.toml -- tag"
"publish:tag:exec" = "run --quiet --manifest-path scripts/publish-cli/Cargo.toml -- tag --execute"
"bump:patch" = "release patch --workspace --no-confirm --execute --no-publish"
"bump:minor" = "release minor --workspace --no-confirm --execute --no-publish"
"bump:major" = "release major --workspace --no-confirm --execute --no-publish"
"test:coverage" = "llvm-cov --workspace --ignore-filename-regex (^|/)traits\\.rs$"
"bench:compile" = "bench --workspace --benches --no-run"
"bench:quick" = "bench --bench queue_common --bench stack_common --bench history_common --bench dinic_common --bench mcmf_common -- --sample-size 10"
"bench:compile:collection" = "bench -p rstl-collection --benches --no-run"
"bench:compile:queue" = "bench -p rstl-queue --benches --no-run"
"bench:compile:stack" = "bench -p rstl-stack --benches --no-run"
"bench:compile:history" = "bench -p rstl-history --benches --no-run"
"bench:compile:dinic" = "bench -p rstl-dinic --benches --no-run"
"bench:compile:mcmf" = "bench -p rstl-mcmf --benches --no-run"
"bench:quick:collection" = "bench -p rstl-collection --benches --no-run"
"bench:quick:queue" = "bench -p rstl-queue --bench queue_common -- --sample-size 10"
"bench:quick:stack" = "bench -p rstl-stack --bench stack_common -- --sample-size 10"
"bench:quick:history" = "bench -p rstl-history --bench history_common -- --sample-size 10"
"bench:quick:dinic" = "bench -p rstl-dinic --bench dinic_common -- --sample-size 10"
"bench:quick:mcmf" = "bench -p rstl-mcmf --bench mcmf_common -- --sample-size 10"
