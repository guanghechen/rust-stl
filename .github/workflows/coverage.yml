name: Coverage

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  circular-queue-coverage:
    name: Circular Queue Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Check circular_queue coverage (>= 98%)
        run: scripts/check_circular_queue_coverage.sh 98
